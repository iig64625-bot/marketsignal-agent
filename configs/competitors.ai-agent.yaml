# 最后更新: V6 (loader schema: target_company + competitors[] + monitoring_dimensions + run_options)

target_company:
  name: "Coze"
  website: "https://www.coze.com"
  description: "字节跳动出品，海外版 coze.com，国内版 coze.cn"

competitors:
  - name: "Coze"
    website: "https://www.coze.com"
    description: "字节跳动出品，海外版 coze.com，国内版 coze.cn"
    sources: []
  - name: "Dify"
    website: "https://dify.ai"
    description: "开源 LLM 应用平台，BaaS 模式"
    sources:
      - type: "github"
        url: "https://github.com/langgenius/dify"
  - name: "Manus"
    website: "https://manus.im"
    description: "通用 AI Agent，2025 年 3 月发布"
    sources:
      - type: "blog"
        url: "https://manus.im/news"
  - name: "Lindy"
    website: "https://www.lindy.ai"
    description: "AI 助手平台，定位个人/团队自动化"
    sources: []
  - name: "FastGPT"
    website: "https://fastgpt.in"
    description: "开源知识库 RAG 平台"
    sources:
      - type: "github"
        url: "https://github.com/labring/FastGPT"

monitoring_dimensions:
  - "product"
  - "product_update"
  - "pricing"
  - "hiring"
  - "gtm"
  - "ecosystem"
  - "enterprise"
  - "community"
  - "user_feedback"
  - "github_release"
  - "risk"

run_options:
  time_window_days: 7
  use_sample_dataset: false
  generate_weekly_report: true
  generate_battlecards: true
  run_evals: true