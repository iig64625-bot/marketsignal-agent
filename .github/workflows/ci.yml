name: CI  on:   push:     branches: [main, master]   pull_request:     branches: [main, master]  jobs:   test:     name: test (Python ${{ matrix.python-version }})     runs-on: ubuntu-latest     strategy:       fail-fast: false       matrix:         python-version: ["3.10", "3.11"]      steps:       - uses: actions/checkout@v4        - name: Set up Python ${{ matrix.python-version }}         uses: actions/setup-python@v5         with:           python-version: ${{ matrix.python-version }}           cache: pip           cache-dependency-path: pyproject.toml        - name: Install dependencies         run: |           python -m pip install --upgrade pip           python -m pip install -e ".[dev,pdf]"           python -m playwright install --with-deps chromium || true        - name: Lint (ruff)         # We gate on `ruff check` (lint) only. `ruff format --check` is run         # locally and on PRs that touch formatting; the codebase was         # auto-formatted in 2026-06 (see commit "style: apply ruff format         # across 139 files").         run: |           ruff check src tests        - name: Type check (mypy)         run: |           mypy src/marketsignal --ignore-missing-imports --no-strict-optional || true        - name: Tests (pytest)         env:           PYTHONPATH: src         run: |           pytest -q        - name: Sample pipeline smoke test         env:           PYTHONPATH: src         run: |           python -m alembic upgrade head           python -m marketsignal run --use-sample-dataset        - name: Upload artifacts         if: always()         uses: actions/upload-artifact@v4         with:           name: reports-${{ matrix.python-version }}           path: |             data/reports/*.md             data/evals/*.json             data/traces/*.json
