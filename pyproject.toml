[build-system] requires = ["setuptools>=68", "wheel"] build-backend = "setuptools.build_meta"  [project] name = "signalpulse-agent" version = "0.1.0" description = "AI Competitive Intelligence & Market Signal Analyst" readme = "README.md" requires-python = ">=3.10" license = { text = "MIT" } authors = [{ name = "Your Name", email = "you@example.com" }]  dependencies = [   # Web framework   "fastapi>=0.110",   "uvicorn[standard]>=0.29",    # Data validation   "pydantic>=2.6",   "pydantic-settings>=2.2",    # Agent / LLM   "langgraph>=0.1",   "langchain-core>=0.2",   "langchain-openai>=0.1",   "langchain-anthropic>=0.1",   "openai>=1.30",   "anthropic>=0.25",    # RAG   "chromadb>=0.5",   "tiktoken>=0.7",    # Scraping & parsing   "httpx>=0.27",   "beautifulsoup4>=4.12",   "trafilatura>=1.7",   "readability-lxml>=0.8",   "feedparser>=6.0",   "langdetect>=1.0.9",   "PyGithub>=2.3",   "playwright>=1.43",    # Scheduling   "apscheduler>=3.10",    # Database   "SQLAlchemy>=2.0",   "alembic>=1.13",    # Logging / utils   "loguru>=0.7",   "tenacity>=8.2",   "python-dotenv>=1.0",   "PyYAML>=6.0",   "rich>=13.7",    # UI   "streamlit>=1.34",   "streamlit-extras",   "plotly>=5.18",   "openpyxl>=3.1",   "croniter>=2.0", ]  [project.optional-dependencies] dev = [   "pytest>=8.1",   "pytest-asyncio>=0.23",   "pytest-cov>=5.0",   "ruff>=0.4",   "mypy>=1.10", ] pdf = ["fpdf2>=2.7"]  [project.scripts] signalpulse = "signalpulse.cli:main"  [tool.setuptools.packages.find] where = ["src"]  [tool.pytest.ini_options] testpaths = ["tests"] addopts = "-q" asyncio_mode = "auto"  [tool.ruff] line-length = 100 target-version = "py310"  [tool.ruff.lint] select = ["E", "F", "I", "B", "UP"] ignore = ["E501"]  [tool.ruff.lint.per-file-ignores] # FastAPI pattern: ``Depends()`` is meant to be in argument defaults. "src/signalpulse/api/**" = ["B008"]